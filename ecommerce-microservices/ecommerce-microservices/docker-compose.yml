
networks:
  ecommerce-net:
    driver: bridge

volumes:
  postgres-users-data:
  postgres-products-data:
  postgres-orders-data:
  mongodb-data:
  zookeeper-data:
  kafka-data:
  prometheus-data:
  grafana-data:

services:
  # ===================== DATABASES =====================

  postgres-users:
    image: postgres:15-alpine
    container_name: postgres-users
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-products:
    image: postgres:15-alpine
    container_name: postgres-products
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-products-data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d products_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-orders:
    image: postgres:15-alpine
    container_name: postgres-orders
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-orders-data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: chatbot_db
    volumes:
      - mongodb-data:/data/db
    networks:
      - ecommerce-net

  # ===================== KAFKA =====================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - ecommerce-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===================== MICROSERVICES =====================

  user-service:
    build:
      context: ./user-service
      target: production
    container_name: user-service
    environment:
      DB_HOST: postgres-users
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-ecommerce-secret-key-minimum-256-bits-for-hs256-algorithm}
    depends_on:
      postgres-users:
        condition: service_healthy
    networks:
      - ecommerce-net
    restart: unless-stopped

  product-service:
    build:
      context: ./product-service
      target: production
    container_name: product-service
    environment:
      DB_HOST: postgres-products
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-products:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      target: production
    container_name: order-service
    environment:
      DB_HOST: postgres-orders
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PRODUCT_SERVICE_URL: http://product-service:8082
    depends_on:
      postgres-orders:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net
    restart: unless-stopped

  chatbot-service:
    build:
      context: ./chatbot-service
      target: production
    container_name: chatbot-service
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      PRODUCT_SERVICE_URL: http://product-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      - mongodb
      - product-service
      - order-service
    networks:
      - ecommerce-net
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      target: production
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-ecommerce-secret-key-minimum-256-bits-for-hs256-algorithm}
    depends_on:
      - user-service
      - product-service
      - order-service
      - chatbot-service
    networks:
      - ecommerce-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - ecommerce-net
    restart: unless-stopped

  # ===================== MONITORING =====================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ecommerce-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./k8s/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./k8s/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - ecommerce-net
    restart: unless-stopped
