name: CI/CD Pipeline — E-Commerce Microservices

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  REGISTRY: docker.io

jobs:
  # ============================= JAVA SERVICES =============================
  build-java-services:
    name: Build & Test Java Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service, product-service, order-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        working-directory: ./${{ matrix.service }}
        run: mvn clean verify -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ./${{ matrix.service }}/target/site/jacoco/

  # ============================= SONARCLOUD =============================
  sonarcloud-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-java-services
    strategy:
      matrix:
        service: [user-service, product-service, order-service]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: SonarCloud Scan
        working-directory: ./${{ matrix.service }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=ecommerce-${{ matrix.service }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  # ============================= PYTHON CHATBOT =============================
  build-chatbot:
    name: Build & Test Chatbot Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        working-directory: ./chatbot-service
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: ./chatbot-service
        run: |
          pip install pytest-cov
          pytest app/tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-chatbot
          path: ./chatbot-service/coverage.xml

  # ============================= FRONTEND =============================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  # ============================= DOCKER BUILD & PUSH =============================
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-java-services, build-chatbot, build-frontend]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: api-gateway
            context: ./api-gateway
          - name: user-service
            context: ./user-service
          - name: product-service
            context: ./product-service
          - name: order-service
            context: ./order-service
          - name: chatbot-service
            context: ./chatbot-service
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          target: production
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


