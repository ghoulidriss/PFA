apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-service
  template:
    metadata:
      labels:
        app: chatbot-service
    spec:
      containers:
        - name: chatbot-service
          image: your-dockerhub/chatbot-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: GEMINI_API_KEY
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: PRODUCT_SERVICE_URL
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: ORDER_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /api/chatbot/chat/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: ecommerce
spec:
  selector:
    app: chatbot-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
